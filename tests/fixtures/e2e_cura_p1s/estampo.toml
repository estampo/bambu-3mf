# CuraEngine multi-filament example — Bambu P1S with AMS
#
# Adapted from estampo/examples/cura-ams-p1s/estampo.toml for bambox e2e
# testing. Definition files are bundled in profiles/cura/definitions/ so
# this works without installing bambox as a Python package.
#
# Run via: estampo run tests/fixtures/e2e_cura_p1s/estampo.toml

name = "cura-ams-p1s"

[pipeline]
stages = ["load", "arrange", "plate", "slice", "pack"]

[plate]
size = [256, 256]
padding = 10.0

[slicer]
engine = "cura"
version = "5.12.0"
bed_type = "Textured PEI Plate"

[slicer.cura]
# bambox P1S AMS definition: 4-extruder machine with BAMBOX header contract.
# The definition files are bundled in profiles/cura/definitions/ so this
# test works without installing bambox as a Python package.
printer = "profiles/cura/definitions/bambox_p1s_ams.def.json"

# Per-slot filament types — drives material_type header and temperatures.
# Slot 1 = white PLA, Slot 4 = black PLA (slots 2 and 3 unused).
filaments = ["PLA", "", "", "PLA"]

# Part 1: cube on AMS slot 1 (white PLA)
[[parts]]
file = "cube_10mm.stl"
filament = 1

# Part 2: cylinder on AMS slot 4 (black PLA), standing upright
[[parts]]
file = "cylinder_5x20mm.stl"
filament = 4
orient = "upright"

# bambox pack: converts CuraEngine G-code → Bambu-compatible .gcode.3mf
[pack]
command = "bambox pack {sliced_dir}/plate.gcode -o {output_dir}/plate.gcode.3mf"
output = "{output_dir}/plate.gcode.3mf"
