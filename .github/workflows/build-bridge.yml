name: Build bridge binaries

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bridge/**'
  workflow_dispatch:

jobs:
  build-bridge:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bambox-bridge-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-15
            artifact: bambox-bridge-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: bambox-bridge-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install g++ (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Build
        working-directory: bridge
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp bridge/target/${{ matrix.target }}/release/bambox-bridge dist/bambox-bridge
          chmod +x dist/bambox-bridge
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/bambox-bridge

  release-assets:
    needs: build-bridge
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for dir in dist/bambox-bridge-*; do
            name=$(basename "$dir")
            cp "$dir/bambox-bridge" "/tmp/$name"
            chmod +x "/tmp/$name"
            rm -rf "$dir"
            mv "/tmp/$name" "dist/$name"
            gh release upload "$TAG" "dist/$name" --repo "${{ github.repository }}" --clobber
          done
          # Upload install script
          gh release upload "$TAG" install.sh --repo "${{ github.repository }}" --clobber
