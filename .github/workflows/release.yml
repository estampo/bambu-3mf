name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0) — use only as fallback"
        required: true

jobs:
  # ── Detect release PR merge on push to main ─────────────────────────
  detect-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check if this is a release PR merge
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          MSG=$(git log -1 --format=%s "$SHA")
          echo "Commit message: $MSG"

          # Primary: parse branch name from merge commit message.
          # Works for true merge commits ("Merge pull request #N from owner/release/vX.Y.Z")
          # but NOT for squash merges, whose message is just the PR title + "(#N)".
          VERSION=$(echo "$MSG" \
            | grep -oP 'release/v\K\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?' \
            | head -1 || true)

          # Fallback 1: extract PR number from the merge message and query the PR
          # directly. This is the path that handles squash merges, and it survives
          # auto-delete-head-branches — unlike the commits/{sha}/pulls endpoint,
          # which returns nothing once the head ref is gone (this is what silently
          # broke v0.4.1; see issue #195).
          if [[ -z "$VERSION" ]]; then
            echo "Merge message did not contain branch name — looking for PR number..."
            PR_NUMBER=$(echo "$MSG" | grep -oP '#\K\d+' | head -1 || true)
            if [[ -n "$PR_NUMBER" ]]; then
              echo "Found PR #${PR_NUMBER} — querying head ref..."
              HEAD_REF=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
                --jq '.head.ref' 2>/dev/null || true)
              echo "PR #${PR_NUMBER} head ref: ${HEAD_REF:-<none>}"
              VERSION=$(echo "$HEAD_REF" \
                | grep -oP '^release/v\K\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?$' \
                | head -1 || true)
            fi
          fi

          # Fallback 2: query the commits/pulls API. Kept as a last resort for
          # non-PR pushes (e.g. direct merges) where a head ref still exists.
          if [[ -z "$VERSION" ]]; then
            echo "PR lookup did not match — falling back to commits/pulls API..."
            BRANCHES=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
              --jq '.[].head.ref' 2>/dev/null || true)
            echo "Associated PR branches: ${BRANCHES:-<none>}"
            VERSION=$(echo "$BRANCHES" \
              | grep -oP '^release/v\K\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?$' \
              | head -1 || true)
          fi

          if [[ -n "$VERSION" ]]; then
            if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
              echo "::warning::Tag v${VERSION} already exists — skipping"
              echo "is_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "is_release=true" >> "$GITHUB_OUTPUT"
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "::notice::Detected release PR merge for v${VERSION}"
            fi
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Verify version ──────────────────────────────────────────────────
  version:
    needs: detect-release
    if: |
      always() &&
      ((needs.detect-release.outputs.is_release == 'true') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract and verify version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${{ needs.detect-release.outputs.version }}"
          else
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          TOML_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [[ "$TOML_VERSION" != "$VERSION" ]]; then
            echo "::error::Version mismatch: pyproject.toml=$TOML_VERSION, release=$VERSION"
            exit 1
          fi

          CARGO_VERSION=$(grep -m1 '^version = ' bridge/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [[ "$CARGO_VERSION" != "$VERSION" ]]; then
            echo "::error::Version mismatch: bridge/Cargo.toml=$CARGO_VERSION, release=$VERSION"
            exit 1
          fi
          echo "::notice::Releasing version $VERSION"

  # ── Build package ───────────────────────────────────────────────────
  build-pypi:
    needs: version
    if: always() && needs.version.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build and validate package
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: pypi-dist
          path: dist/
          retention-days: 5

  # ── Dry-run: validate on TestPyPI before real publish ───────────────
  dry-run-publish:
    needs: [version, build-pypi]
    if: always() && needs.version.result == 'success' && needs.build-pypi.result == 'success'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to TestPyPI (dry-run gate)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── Create tag only after TestPyPI succeeds ─────────────────────────
  create-tag:
    needs: [version, detect-release, dry-run-publish]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.dry-run-publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Create and push tag (if it doesn't exist)
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::notice::Tag v${VERSION} already exists — skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "::notice::Created tag v${VERSION}"
          fi

  # ── Create GitHub Release ───────────────────────────────────────────
  # Runs before publish-pypi so PyPI is only published once everything else succeeds.
  # Idempotent: updates an existing release rather than failing on retry.
  github-release:
    needs: [version, create-tag, dry-run-publish]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.dry-run-publish.result == 'success' &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/download-artifact@v7
        with:
          name: pypi-dist
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          BODY=$(awk "/^## ${VERSION//./\\.} /{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          echo "$BODY" > /tmp/release-body.md
          echo "Changelog body:"
          cat /tmp/release-body.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "::notice::Release v${VERSION} already exists — updating"
            gh release edit "v${VERSION}" --notes-file /tmp/release-body.md
            if [[ -n "$WHEEL" ]]; then
              gh release upload "v${VERSION}" "$WHEEL" --clobber
            fi
          else
            ARGS=(gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/release-body.md)
            # Mark pre-releases (rc, alpha, beta) appropriately
            if [[ "$VERSION" =~ (a|b|rc)[0-9]+$ ]]; then
              ARGS+=(--prerelease)
            fi
            if [[ -n "$WHEEL" ]]; then
              ARGS+=("$WHEEL")
            fi
            "${ARGS[@]}"
          fi

  # ── Publish to PyPI — only after everything else succeeds ────────────
  publish-pypi:
    needs: [version, github-release]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.github-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── Notify estampo of new release ────────────────────────────────────
  # Creates an issue on estampo/estampo so maintainers know to update
  # the bambox dependency. Skipped for pre-releases (rc, alpha, beta).
  notify-estampo:
    needs: [version, publish-pypi]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.publish-pypi.result == 'success' &&
      !contains(needs.version.outputs.version, 'a') &&
      !contains(needs.version.outputs.version, 'b') &&
      !contains(needs.version.outputs.version, 'rc')
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on estampo/estampo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh issue create \
            --repo estampo/estampo \
            --title "bambox v${VERSION} released — update dependency" \
            --body "bambox [v${VERSION}](https://github.com/estampo/bambox/releases/tag/v${VERSION}) has been published to PyPI.

          Please update the bambox dependency to \`>=${VERSION}\` and rebuild.

          _This issue was created automatically by the bambox release pipeline._"

  # ── Trigger bridge binary build ─────────────────────────────────────
  # Tags created by GITHUB_TOKEN don't trigger other workflows, so we
  # explicitly dispatch the bridge build to attach native binaries to
  # the release.
  build-bridge:
    needs: [version, create-tag]
    if: |
      always() &&
      needs.version.result == 'success' &&
      needs.create-tag.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bridge build
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh workflow run build-bridge.yml \
            --repo "${{ github.repository }}" \
            --ref "v${{ needs.version.outputs.version }}"
